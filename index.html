<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSSA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="panel auth-panel">
      <p class="eyebrow">Security</p>
      <h1>Security Vault</h1>
      <p class="muted">All pages are locked. Use the Solaryn access phrase to open the management dashboard. - duke was here :) </p>
      <form id="login-form" class="stack" autocomplete="off">
        <label for="master-password">Master Password</label>
        <input id="master-password" name="master-password" type="password" required placeholder="Enter password (contact duke for it)" />
        <button type="submit" class="btn btn-primary">Unlock Security Vault</button>
      </form>
      <p id="login-message" class="message" aria-live="polite"></p>
      <div class="divider"></div>
      <p class="hint">Security controls inclue a lot of things, put in the password to check it out.</p>
    </section>
  </main>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    window.SolarynAuth.initLoginPage();
  </script>
</body>
</html>
