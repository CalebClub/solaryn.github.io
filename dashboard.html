<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solaryn Safety Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Solaryn Safety System</p>
      <h1>Security Dashboard</h1>
    </div>
    <button id="logout" class="btn btn-danger" type="button">Lock & Logout</button>
  </header>

  <nav class="tabs" aria-label="Primary">
    <a class="tab active" href="dashboard.html">Dashboard</a>
    <a class="tab" href="generator.html">Password Generator</a>
    <a class="tab" href="list.html">Staff Password List</a>
    <a class="tab" href="manager.html">Staff Manager</a>
    <a class="tab" href="backup.html">Backup & Restore</a>
  </nav>

  <main class="layout">
    <section class="panel">
      <h2>System Overview</h2>
      <div class="stats-grid">
        <article class="stat-card">
          <p class="muted">Staff Records</p>
          <p id="staff-count" class="stat-value">0</p>
        </article>
        <article class="stat-card">
          <p class="muted">Active Records</p>
          <p id="active-count" class="stat-value">0</p>
        </article>
        <article class="stat-card">
          <p class="muted">Audit Events</p>
          <p id="audit-count" class="stat-value">0</p>
        </article>
        <article class="stat-card">
          <p class="muted">Codes Expiring Soon</p>
          <p id="challenge-expiring-count" class="stat-value">0</p>
        </article>
        <article class="stat-card">
          <p class="muted">Needs Password Rotation</p>
          <p id="rotation-needed-count" class="stat-value">0</p>
        </article>
      </div>
    </section>

    <section class="panel">
      <h2>Recent Audit Events</h2>
      <ul id="audit-preview" class="audit-list"></ul>
    </section>
  </main>

  <script src="assets/js/auth.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/dashboard.js"></script>
</body>
</html>
